spring.application.name=mybatis_test

# 애플리케이션 시작 시 create-tables.sql, sample-data.sql 실행
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/create-tables.sql
spring.sql.init.data-locations=classpath:sql/sample-data.sql
logging.level.org.springframework.jdbc.datasource.init=DEBUG

# H2 인메모리 DB 연결 설정
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=

# 브라우저에서 H2 콘솔에 접속할 수 있도록 설정
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# MyBatis 설정
mybatis.mapper-locations=classpath:mapper/*.xml
# DTO 패키지를 스캔해서 Mapper XML에서 타입 별칭처럼 사용할 수 있도록 설정
mybatis.type-aliases-package=com.example.mybatis_test.dto
# DB 컬럼명(snake_case)을 자바 필드명(camelCase)으로 자동 매핑
mybatis.configuration.map-underscore-to-camel-case=true
# 실행되는 SQL을 콘솔에 출력해서 실습과 디버깅에 활용
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# JSP 뷰 설정
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp
